name: Weekly HCC Site Update

on:
  schedule:
    - cron: "0 13 * * 1"   # Every Monday 6am PDT

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print changes only, don't commit)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  update-site:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5        # Node 24 ✓

      - name: Set up Python 3.11
        uses: actions/setup-python@v6   # Node 24 ✓
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 playwright

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run HCC scraper
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scraper.py \
            --input  hollywoodcc.html \
            --output hollywoodcc.html \
            $DRY_RUN_FLAG

      - name: Commit updated site
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "HCC Bot"
          git config user.email "hcc-bot@users.noreply.github.com"
          if git diff --quiet hollywoodcc.html; then
            echo "No changes detected — site already up to date."
          else
            DATE=$(date +'%Y-%m-%d')
            git add hollywoodcc.html
            git commit -m "chore: weekly stats update ${DATE}"
            git push
            echo "Site updated and pushed successfully."
          fi

      - name: Print summary
        run: |
          echo "======================================"
          echo " HCC weekly update complete"
          echo " Run date: $(date +'%A %B %-d, %Y')"
          echo "======================================"
